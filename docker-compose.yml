services:
  # MySQL 数据库
  mysql:
    image: mysql:8.3.0
    container_name: fitness-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitness_tracker
      MYSQL_USER: fitness
      MYSQL_PASSWORD: fitness123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fitness-network

  # NestJS 后端
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fitness-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: fitness_tracker
      JWT_SECRET: fitness-tracker-jwt-secret-key-2024
      WX_APPID: wxf29facc70542b8dc
      WX_SECRET: 475dd5f16ee9442f4deb7180d5707a8c
    depends_on:
      - mysql
    networks:
      - fitness-network

volumes:
  mysql-data:

networks:
  fitness-network:
    driver: bridge